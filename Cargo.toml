[package]
name = "rehuman"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Your Name <you@example.com>"]
license = "MIT"
description = "Unicode-safe text cleaning & typographic normalization for Rust"
repository = "https://example.com/rehuman"
keywords = ["unicode", "normalize", "cleanup", "whitespace", "quotes", "dashes", "ellipsis"]
categories = ["text-processing", "parser-implementations"]

[features]
default = ["unorm"]
# Enable full Unicode normalization (NFC/NFD/NFKC/NFKD)
unorm = ["dep:unicode-normalization"]

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.50", features = ["derive"] }
directories = "6.0.0"
serde = { version = "1.0.228", features = ["derive"] }
toml = "0.9.8"
unicode-normalization = { version = "0.1", optional = true }

[[bin]]
name = "rehuman"
path = "src/bin/rehuman.rs"

[lib]
name = "rehuman"
path = "src/lib.rs"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
